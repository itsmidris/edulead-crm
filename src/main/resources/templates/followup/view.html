<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>View Follow-up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Follow-up Details</h2>
            <a th:href="@{/follow-ups}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i>
                Back
            </a>
        </div>

        <div class="card shadow-sm">

            <div class="card-header">
                <h5 class="mb-0">Follow-up Information</h5>
            </div>

            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-6">
                        <strong>Lead Reference</strong>
                        <p th:text="${followUp.leadReference}"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Student</strong>
                        <p th:text="${followUp.studentName}"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Caller</strong>
                        <p th:text="${followUp.callerName}"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Subject</strong>
                        <p th:text="${followUp.subject}"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Follow-up Date & Time</strong>
                        <p th:text="${#temporals.format(followUp.followUpDateTime,'dd MMM yyyy HH:mm')}"></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Priority</strong>
                        <p><span class="badge bg-info" th:text="${followUp.priority}"></span></p>
                    </div>

                    <div class="col-md-6">
                        <strong>Status</strong>
                        <p><span class="badge bg-success" th:text="${followUp.status}"></span></p>
                    </div>

                    <div class="col-md-6" th:if="${followUp.completedAt != null}">
                        <strong>Completed At</strong>
                        <p th:text="${#temporals.format(followUp.completedAt,'dd MMM yyyy HH:mm')}"></p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
