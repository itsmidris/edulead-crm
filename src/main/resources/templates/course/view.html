<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-book"></i>
                Course Details
            </h2>
            <div>
                <a th:href="@{/courses/edit/{id}(id=${course.id})}"
                   class="btn btn-warning">
                    <i class="bi bi-pencil-square"></i>
                    Edit
                </a>
                <a th:href="@{/courses}"
                   class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i>
                    Back
                </a>
            </div>
        </div>

        <!-- Course Information -->
        <div class="card shadow-sm mb-4">
            <div class="card-header">
                <strong>
                    <i class="bi bi-journal-bookmark"></i>
                    Course Information
                </strong>
            </div>
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tr>
                        <th width="25%">Course Name</th>
                        <td th:text="${course.courseName}"></td>
                    </tr>
                    <tr>
                        <th>Duration</th>
                        <td><span th:text="${course.duration}"></span>Year(s)</td>
                    </tr>
                    <tr>
                        <th>Description</th>
                        <td th:text="${course.description}"></td>
                    </tr>
                    <tr>
                        <th>Status</th>
                        <td>
                            <span class="badge bg-success" th:if="${course.active}">ACTIVE</span>
                            <span class="badge bg-danger" th:unless="${course.active}">INACTIVE</span>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <!-- Audit Information -->
        <div class="card shadow-sm">
            <div class="card-header">
                <strong>
                    <i class="bi bi-clock-history"></i>
                    Audit Information
                </strong>
            </div>
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tr>
                        <th width="25%">Created At</th>
                        <td th:text="${#temporals.format(course.createdAt,'dd MMM yyyy HH:mm')}"></td>
                    </tr>
                    <tr>
                        <th>Updated At</th>
                        <td th:text="${#temporals.format(course.updatedAt,'dd MMM yyyy HH:mm')}"></td>
                    </tr>
                </table>
            </div>
        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
