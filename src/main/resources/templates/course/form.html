<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Course' : 'Add Course'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center">

            <h2 th:text="${isEdit} ? 'Edit Course' : 'Add Course'"></h2>

            <a th:href="@{/courses}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i>Back</a>

        </div>

        <hr>

        <form method="post"
              th:action="${isEdit}
                    ? @{/courses/edit/{id}(id=${courseId})}
                    : @{/courses/add}"

              th:object="${courseForm}">

            <div class="card shadow-sm">

                <div class="card-header">

                    <h5 class="mb-0"><i class="bi bi-book-fill"></i>Course Information</h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <!-- Course Name -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Course Name *</label>
                            <input type="text" class="form-control" th:field="*{courseName}" placeholder="Enter Course Name">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('courseName')}"
                                 th:errors="*{courseName}">
                            </div>
                        </div>

                        <!-- Duration -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duration (Years) *</label>
                            <input type="number" class="form-control" th:field="*{duration}" placeholder="Enter Duration">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('duration')}"
                                 th:errors="*{duration}">
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="col-12 mb-3">
                            <label class="form-label">Description
                            </label>
                            <textarea rows="4" class="form-control" th:field="*{description}" placeholder="Enter Description"></textarea>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>
                        </div>

                        <!-- Active -->
                        <div class="col-md-6 mb-3" th:if="${isEdit}">
                            <div class="form-check mt-3">
                                <input class="form-check-input" type="checkbox" th:field="*{active}">
                                <label class="form-check-label">Active Course</label>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

            <div class="text-end mt-4">
                <a th:href="@{/courses}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-floppy"></i>
                    <span th:text="${isEdit}
                            ? 'Update Course'
                            : 'Save Course'"></span>
                </button>

            </div>

        </form>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
