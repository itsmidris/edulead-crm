<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title th:text="${isEdit} ? 'Edit Lead' : 'Add Lead'"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center">
            <h2 th:text="${isEdit} ? 'Edit Lead' : 'Add Lead'"></h2>
            <a th:href="@{/leads}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i>Back
            </a>
        </div>

        <hr>

        <form method="post"
              th:action="${isEdit}
              ? @{/leads/edit/{id}(id=${leadId})}
              : @{/leads/add}"

              th:object="${isEdit} ?
                 ${updateLeadRequest}
                 :
                 ${createLeadRequest}">

            <div class="card shadow-sm mb-4">

                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-person-fill"></i>Personal Information</h5>
                </div>

                <div class="card-body">
                    <div class="row">

                        <!-- First Name -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name *</label>
                            <input type="text" class="form-control" th:field="*{firstName}" placeholder="Enter First Name">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('firstName')}"
                                 th:errors="*{firstName}">
                            </div>
                        </div>

                        <!-- Last Name -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name *</label>
                            <input type="text" class="form-control" th:field="*{lastName}" placeholder="Enter Last Name">
<!--                            <div class="text-danger"-->
<!--                                 th:if="${#fields.hasErrors('lastName')}"-->
<!--                                 th:errors="*{lastName}">-->
<!--                            </div>-->
                        </div>

                        <!-- Student Phone -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Student Phone *</label>
                            <input type="text" class="form-control" th:field="*{studentPhone}" placeholder="9876543210">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('studentPhone')}"
                                 th:errors="*{studentPhone}">
                            </div>
                        </div>

                        <!-- Parent Phone -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Parent Phone</label>
                            <input type="text" class="form-control" th:field="*{parentPhone}" placeholder="9876543210">
                        </div>

                        <!-- Email -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="student@email.com">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">

                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-journal-bookmark-fill"></i>Lead Information</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <!-- Course -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Course *</label>
                            <select class="form-select" th:field="*{courseId}">
                                <option value="">Select Course</option>
                                <option
                                        th:each="course : ${courses}"
                                        th:value="${course.id}"
                                        th:text="${course.courseName}">
                                </option>
                            </select>
                        </div>

                        <!-- Lead Type -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lead Type *</label>
                            <select class="form-select" th:field="*{leadType}">
                                <option value="">Select Lead Type</option>
                                <option
                                        th:each="type : ${leadTypes}"
                                        th:value="${type}"
                                        th:text="${type}">
                                </option>
                            </select>
                        </div>

                        <!-- Lead Source -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lead Source *</label>
                            <select class="form-select" th:field="*{leadSource}">
                                <option value="">Select Lead Source</option>
                                <option
                                        th:each="source : ${leadSources}"
                                        th:value="${source}"
                                        th:text="${source}">
                                </option>
                            </select>
                        </div>

                        <!-- Lead Creation Method -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lead Creation Method *</label>
                            <select class="form-select" th:field="*{leadCreationMethod}">
                                <option value="">Select Creation Method</option>
                                <option
                                        th:each="method : ${leadCreationMethods}"
                                        th:value="${method}"
                                        th:text="${method}">
                                </option>
                            </select>
                        </div>

                        <!-- Assigned Caller -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Assigned Caller</label>
                            <select class="form-select" th:field="*{assignedCallerId}">
                                <option value="">Select Caller</option>
                                <option
                                        th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.firstName + ' ' + user.lastName}">
                                </option>
                            </select>
                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow-sm mb-4">

                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-geo-alt-fill"></i>Address</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">State</label>
                            <input type="text" class="form-control" th:field="*{state}" placeholder="Enter State">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" th:field="*{city}" placeholder="Enter City">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <textarea rows="3" class="form-control" th:field="*{address}" placeholder="Enter Address"></textarea>
                        </div>

                    </div>

                </div>

            </div>

            <div class="card shadow-sm mb-4">

                <div class="card-header">

                    <h5 class="mb-0"><i class="bi bi-calendar-check-fill"></i>Follow-up Information</h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Next Follow-up</label>
                            <input type="date" class="form-control" th:field="*{nextFollowUpDate}">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Counseling Required</label>
                            <div class="form-check mt-2">
                                <input type="checkbox" class="form-check-input" th:field="*{counselingRequired}">
                                <label class="form-check-label">Yes</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Remark</label>
                            <textarea rows="4" class="form-control" th:field="*{remark}" placeholder="Enter Remark"></textarea>
                        </div>

                    </div>

                </div>

            </div>

            <div class="text-end">
                <a th:href="@{/leads}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">

                    <i class="bi bi-floppy"></i>

                    <span th:text="${isEdit} ? 'Update Lead' : 'Save Lead'"></span>

                </button>
            </div>

        </form>

    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
