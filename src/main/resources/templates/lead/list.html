<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Lead Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Lead Management</h2>

            <div class="alert alert-success alert-dismissible fade show"
                 role="alert"
                 th:if="${param.success}">
                <i class="bi bi-check-circle-fill"></i>
                Lead created successfully.
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>

            <div class="alert alert-success alert-dismissible fade show"
                 role="alert"
                 th:if="${param.updated}">
                <i class="bi bi-check-circle-fill"></i>
                Lead updated successfully.
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>

            <div class="alert alert-warning alert-dismissible fade show"
                 role="alert"
                 th:if="${param.deleted}">
                <i class="bi bi-trash"></i>
                Lead deactivated successfully.
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>

            <a th:href="@{/leads/add}" class="btn btn-primary"> <i class="bi bi-plus-circle"></i>
                Add Lead
            </a>


        </div>

        <div class="row mb-3">

            <form th:action="@{/leads}" method="get" class="row g-2 mb-3 align-items-center">
                <div class="col-md-7">
                    <input type="text"
                           class="form-control"
                           name="keyword"
                           placeholder="Search by Name, Phone, Email or Reference..."
                           th:value="${keyword}">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">All Status</option>
                        <option th:each="status : ${statuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${selectedStatus == status}">
                        </option>
                    </select>
                </div>
                <div class="col-md-1 d-grid">
                    <button class="btn btn-primary">Search</button>
                </div>
                <div class="col-md-1 d-grid">
                    <a th:href="@{/leads}" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>

        </div>

        <table class="table table-hover table-striped align-middle shadow-sm">

            <thead class="table-dark">
            <tr>
                <th>Ref</th>
                <th>Student</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Caller</th>
                <th>Status</th>
                <th>Next Follow-up</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(leads)}">

                <td colspan="8" class="text-center text-muted">

                    No Leads Found

                </td>

            </tr>

            <tr th:each="lead : ${leads}">

                <td th:text="${lead.referenceCode}"></td>

                <td>
                    <span th:text="${lead.firstName + ' ' + lead.lastName}"></span>
                </td>

                <td th:text="${lead.studentPhone}"></td>

                <td th:text="${lead.courseName}"></td>

                <td th:text="${lead.assignedCaller}"></td>

                <td>
                    <span class="badge"
                          th:classappend="${
                          lead.leadStatus.name() == 'NEW' ? 'bg-primary' :
                          lead.leadStatus.name() == 'CONTACTED' ? 'bg-info' :
                          lead.leadStatus.name() == 'FOLLOW_UP' ? 'bg-warning text-dark' :
                          lead.leadStatus.name() == 'COUNSELING_REQUIRED' ? 'bg-secondary' :
                          lead.leadStatus.name() == 'ADMISSION_COMPLETED' ? 'bg-success' :
                          lead.leadStatus.name() == 'LOST' ? 'bg-danger' :
                          'bg-dark'
                    }"
                          th:text="${lead.leadStatus}">

                    </span>
                </td>

                <td th:text="${lead.nextFollowUpDate}"></td>

                <td>

                    <a th:href="@{/leads/edit/{id}(id=${lead.id})}" class="btn btn-sm btn-warning" title="Edit Lead">
                        <i class="bi bi-pencil-square"></i>
                    </a>

                    <a th:href="@{/leads/{id}(id=${lead.id})}"
                       class="btn btn-sm btn-info"
                       title="View Lead">
                        <i class="bi bi-eye"></i>
                    </a>

                    <form th:action="@{/leads/deactivate/{id}(id=${lead.id})}"
                          method="post"
                          class="d-inline"
                          onsubmit="return confirm('Are you sure you want to deactivate this lead?');">
                        <button class="btn btn-sm btn-danger"
                                title="Deactivate Lead">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
