<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Lead Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Lead Management</h2>

            <a th:href="@{/leads/add}" class="btn btn-primary"> <i class="bi bi-plus-circle"></i>
                Add Lead
            </a>
                <i class="bi bi-plus-circle"></i>
                Add Lead
            </button>

        </div>

        <div class="row mb-3">

            <div class="col-md-4">

                <input
                        type="text"
                        class="form-control"
                        placeholder="Search leads...">

            </div>

            <div class="col-md-3">

                <select class="form-select">

                    <option>All Status</option>

                    <option>NEW</option>

                    <option>CONTACTED</option>

                    <option>FOLLOW_UP</option>

                    <option>COUNSELING_REQUIRED</option>

                    <option>ADMISSION_COMPLETED</option>

                    <option>LOST</option>

                </select>

            </div>

        </div>

        <table class="table table-hover table-striped align-middle shadow-sm">

            <thead class="table-dark">
            <tr>
                <th>Ref</th>
                <th>Student</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Caller</th>
                <th>Status</th>
                <th>Next Follow-up</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(leads)}">

                <td colspan="8" class="text-center text-muted">

                    No Leads Found

                </td>

            </tr>

            <tr th:each="lead : ${leads}">

                <td th:text="${lead.id}"></td>

                <td>
                    <span th:text="${lead.firstName}"></span>
                    <span th:text="${lead.lastName}"></span>
                </td>

                <td th:text="${lead.studentPhone}"></td>

                <td>
                    <span class="badge"
                          th:classappend="${
                          lead.leadStatus.name() == 'NEW' ? 'bg-primary' :
                          lead.leadStatus.name() == 'CONTACTED' ? 'bg-info' :
                          lead.leadStatus.name() == 'FOLLOW_UP' ? 'bg-warning text-dark' :
                          lead.leadStatus.name() == 'COUNSELING_REQUIRED' ? 'bg-secondary' :
                          lead.leadStatus.name() == 'ADMISSION_COMPLETED' ? 'bg-success' :
                          lead.leadStatus.name() == 'LOST' ? 'bg-danger' :
                          'bg-dark'
                    }"
                          th:text="${lead.leadStatus}">

                    </span>
                </td>

                <td>

                    <button class="btn btn-sm btn-warning" title="Edit Lead">

                        <i class="bi bi-pencil-square"></i>

                    </button>

                    <button class="btn btn-sm btn-info" title="View Lead">

                        <i class="bi bi-eye"></i>

                    </button>

                    <button class="btn btn-sm btn-danger" title="Deactivate Lead">

                        <i class="bi bi-trash"></i>

                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
