<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lead History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <h2>Lead History</h2>

        <hr>

        <form method="get" th:action="@{/call-logs/caller-history/result}">

            <div class="row">

                <div class="col-md-6">
                    <label class="form-label">Select Caller</label>
                    <select class="form-select" name="leadId" required>
                        <option value="">Select Lead</option>
                        <option
                                th:each="lead : ${leads}"
                                th:value="${lead.id}"
                                th:text="${lead.referenceCode + ' - ' + lead.fullName}">
                        </option>
                    </select>
                </div>

            </div>

            <div class="mt-3">
                <button class="btn btn-primary">Search</button>
            </div>

        </form>

    </div>

</div>

</body>

</html>
