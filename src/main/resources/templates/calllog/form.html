<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Call Log</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center">
            <h2>Add Call Log</h2>
            <a th:href="@{/call-logs}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i>
                Back
            </a>
        </div>

        <hr>

        <form method="post"
              th:action="@{/call-logs/add}"
              th:object="${callLogForm}">

            <div class="card shadow-sm">

                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-telephone"></i>Call Details</h5>
                </div>

                <div class="card-body">

                    <div class="row">

                        <!-- Lead -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lead *</label>
                            <select class="form-select" th:field="*{leadId}">
                                <option value="">Select Lead</option>
                                <option th:each="lead : ${leads}"
                                        th:value="${lead.id}"
                                        th:text="${lead.referenceCode + ' - ' + lead.fullName}">
                                </option>
                            </select>
                            <div class="text-danger" th:errors="*{leadId}"></div>
                        </div>

                        <!-- Caller -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Caller *</label>
                            <select class="form-select" th:field="*{callerId}">
                                <option value="">Select Caller</option>
                                <option th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.firstName + ' ' + user.lastName + ' (' + user.role + ')'}">
                                </option>
                            </select>
                            <div class="text-danger" th:errors="*{callerId}"></div>
                        </div>

                        <!-- Outcome -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Call Outcome *</label>
                            <select id="callOutcome" class="form-select" th:field="*{callOutcome}">
                                <option value="">Select Outcome</option>
                                <option value="INTERESTED">Interested</option>
                                <option value="CALLBACK_REQUESTED">Callback Requested</option>
                                <option value="COUNSELING_REQUIRED">Counseling Required</option>
                                <option value="NOT_INTERESTED">Not Interested</option>
                                <option value="WRONG_NUMBER">Wrong Number</option>
                                <option value="ADMISSION_TAKEN_ELSEWHERE">Admission Taken Elsewhere</option>
                                <option value="BUSY">Busy</option>
                                <option value="NO_ANSWER">No Answer</option>
                            </select>
                            <div class="text-danger" th:errors="*{callOutcome}"></div>
                        </div>

                        <!-- Duration -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duration (Seconds)</label>
                            <input type="number" class="form-control" th:field="*{durationInSeconds}" placeholder="Example: 180">
                        </div>

                        <!-- Remarks -->
                        <div class="col-12 mb-3">
                            <label class="form-label">Remarks</label>
                            <textarea rows="4"
                                      class="form-control"
                                      th:field="*{remarks}"
                                      placeholder="Enter remarks">
                            </textarea>
                        </div>

                        <!-- Next Follow-up -->
                        <div id="nextFollowUpDiv"
                             class="col-md-6 mb-3"
                             style="display:none;">
                            <label class="form-label">Next Follow-up Date</label>
                            <input type="date" class="form-control" th:field="*{nextFollowUpDate}">
                        </div>

                    </div>

                </div>

            </div>

            <div class="text-end mt-4">

                <a th:href="@{/call-logs}" class="btn btn-secondary">Cancel</a>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-telephone-plus"></i>
                    Save Call Log
                </button>

            </div>

        </form>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    const outcome = document.getElementById("callOutcome");
    const nextFollowUp = document.getElementById("nextFollowUpDiv");
    function toggleFollowUp() {
        if (outcome.value === "CALLBACK_REQUESTED"
            || outcome.value === "COUNSELING_REQUIRED") {
            nextFollowUp.style.display = "block";
        } else {
            nextFollowUp.style.display = "none";
        }
    }
    outcome.addEventListener("change", toggleFollowUp);
    toggleFollowUp();
</script>

</body>

</html>
