<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="loginOptions"
     class="login-options">

  <!-- Remember Me + Forgot Password -->
  <div class="options-top">

    <div class="form-check">
      <input
              class="form-check-input"
              type="checkbox"
              id="remember-me"
              name="remember-me">
      <label
              class="form-check-label"
              for="remember-me">
        Remember Me
      </label>
    </div>

    <a href="#"
       class="forgot-password">
      Forgot Password?
    </a>

  </div>

  <!-- Divider -->
  <div class="login-divider">
    <span></span>
  </div>

  <!-- Bottom - "Need an account? Contact Administrator" on one line -->
  <div class="options-bottom">
    <span>Need an account?</span>
    <a href="mailto:admin@eduleadcrm.com">Contact Administrator</a>
  </div>

</div>

</body>
</html>
