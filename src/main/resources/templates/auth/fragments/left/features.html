<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<section th:fragment="features"
         class="features-section">

  <div class="feature-grid">

    <!-- Lead -->

    <article class="feature-card">

      <div class="feature-icon blue">

        <i class="fa-solid fa-users"></i>

      </div>

      <div class="feature-content">

        <h5>Lead Management</h5>

        <p>
          Capture, organize and track student leads efficiently.
        </p>

      </div>

      <div class="feature-arrow">

        <i class="fa-solid fa-arrow-right"></i>

      </div>

    </article>

    <!-- Call -->

    <article class="feature-card">

      <div class="feature-icon green">

        <i class="fa-solid fa-phone"></i>

      </div>

      <div class="feature-content">

        <h5>Call Tracking</h5>

        <p>
          Record conversations and monitor every follow-up.
        </p>

      </div>

      <div class="feature-arrow">

        <i class="fa-solid fa-arrow-right"></i>

      </div>

    </article>

    <!-- Follow-up -->

    <article class="feature-card">

      <div class="feature-icon orange">

        <i class="fa-regular fa-calendar"></i>

      </div>

      <div class="feature-content">

        <h5>Follow-up Scheduling</h5>

        <p>
          Stay organized and never miss an important interaction.
        </p>

      </div>

      <div class="feature-arrow">

        <i class="fa-solid fa-arrow-right"></i>

      </div>

    </article>

    <!-- Dashboard -->

    <article class="feature-card">

      <div class="feature-icon purple">

        <i class="fa-solid fa-chart-line"></i>

      </div>

      <div class="feature-content">

        <h5>Analytics Dashboard</h5>

        <p>
          Monitor admissions, performance and conversion trends.
        </p>

      </div>

      <div class="feature-arrow">

        <i class="fa-solid fa-arrow-right"></i>

      </div>

    </article>

  </div>

</section>

</body>
</html>
