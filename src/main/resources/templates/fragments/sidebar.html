<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div class="bg-light border-end vh-100 p-3" style="width:250px;" th:fragment="sidebar">

    <h5>Navigation</h5>

    <hr>

    <ul class="nav flex-column">

        <li class="nav-item mb-2">
