    <rect x="39" y="53" width="50" height="6" rx="3" fill="white"></rect>

    <line x1="96" y1="38" x2="96" y2="60" stroke="white" stroke-width="4"></line>

    <circle cx="96" cy="63" r="3" fill="white"></circle>

    <!-- EL Letters -->

    <text x="64" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="white">

